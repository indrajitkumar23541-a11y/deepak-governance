<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Contact Form | EmailJS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- EmailJS CDN -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        :root {
            --primary: #1E3A8A;
            --accent: #F59E0B;
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --text: #1E293B;
            --text-light: #64748B;
            --success: #10B981;
            --error: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .contact-container {
            background: var(--surface);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            border: 1px solid #E2E8F0;
        }

        h2 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: 700;
        }

        p.subtitle {
            color: var(--text-light);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #E2E8F0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background: #1e2d5b;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #94A3B8;
            cursor: not-allowed;
            transform: none;
        }

        .status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            text-align: center;
        }

        .success {
            display: block;
            background: #ECFDF5;
            color: var(--success);
            border: 1px solid #A7F3D0;
        }

        .error {
            display: block;
            background: #FEF2F2;
            color: var(--error);
            border: 1px solid #FECACA;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="contact-container">
    <h2>Send a Message</h2>
    <p class="subtitle">I'll get back to you as soon as possible.</p>
    
    <form id="contact-form">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="from_name" placeholder="John Doe" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="reply_to" placeholder="john@example.com" required>
        </div>
        
        <div class="form-group">
            <label for="message">Your Message</label>
            <textarea id="message" name="message" rows="5" placeholder="How can I help you?" required></textarea>
        </div>
        
        <button type="submit" id="submit-btn">
            Send Message
        </button>
    </form>
    
    <div id="status" class="status-message"></div>
</div>

<script type="text/javascript">
    (function() {
        // --- EmailJS Config ---
        const PUBLIC_KEY = "iU9JiI1gbd2LL3lJq"; 
        const SERVICE_ID = "service_k4da02p"; 
        const TEMPLATE_ID = "template_ksc3o14"; 
        // -----------------------

        // Initialize EmailJS
        emailjs.init(PUBLIC_KEY);

        const contactForm = document.getElementById('contact-form');
        const submitBtn = document.getElementById('submit-btn');
        const statusDiv = document.getElementById('status');

        contactForm.addEventListener('submit', function(event) {
            event.preventDefault();

            // Change button state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Sending...';
            statusDiv.style.display = 'none';

            // Send email
            emailjs.sendForm(SERVICE_ID, TEMPLATE_ID, this)
                .then(() => {
                    // Success
                    statusDiv.innerText = "✓ Success! Your message has been sent.";
                    statusDiv.className = "status-message success";
                    statusDiv.style.display = "block";
                    
                    // Reset form
                    contactForm.reset();
                })
                .catch((error) => {
                    // Error
                    console.error('EmailJS Error:', error);
                    statusDiv.innerText = "❌ Error: Failed to send message. Please try again.";
                    statusDiv.className = "status-message error";
                    statusDiv.style.display = "block";
                })
                .finally(() => {
                    // Restore button
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Send Message';
                });
        });
    })();
</script>

</body>
</html>
